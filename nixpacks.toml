[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nginx", "nodejs_22"]

[phases.install]
cmds = [
  "mkdir -p /var/log/nginx && mkdir -p /var/cache/nginx",
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"