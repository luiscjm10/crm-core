[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nginx", "nodejs_22", "supervisor"]

[phases.install]
cmds = [
  "mkdir -p /var/log/nginx /var/cache/nginx /var/log/supervisor",
  "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = """php artisan migrate --force && php artisan optimize && node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && cp /app/supervisord.conf /etc/supervisor/conf.d/laravel.conf && supervisord -c /etc/supervisor/conf.d/laravel.conf"""
